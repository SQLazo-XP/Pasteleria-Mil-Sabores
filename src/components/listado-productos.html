<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - Administrador | Pasteleria Mil Sabores</title>
    <link rel="stylesheet" href="../css/css-Admin/admin-productos.css">
</head>
<body>

<div class="container">

    <aside class="sidebar">
        <div class="logo"><h2>Pasteleria<br>Mil Sabores</h2></div>
        <nav id="sidebar-nav">
            <a href="./admin-home.html">Dashboard</a>
            <a href="#" class="active">Productos</a>
            <a href="./usuarios.html">Usuarios</a>
            <a href="#">Inventario</a>
            <a href="#">Reportes</a>
            <a href="#" onclick="localStorage.removeItem('usuario_sesion'); window.location.href='../../index.html'; return false;" style="margin-top:auto;padding-top:20px;border-top:1px solid #ddd;">Cerrar Sesion</a>
        </nav>
    </aside>

    <main class="contenido">

        <div class="top-bar">
            <h1>Productos</h1>
            <div class="top-bar-right">
                <button class="btn-nuevo" onclick="window.location.href='./crear-producto.html'">NUEVO PRODUCTO</button>
            </div>
        </div>

        <div class="buscador">
            <input type="text" id="search-input" placeholder="Buscar productos..." oninput="filtrarProductos(this.value)">
        </div>

        <div class="tabla-container">
            <table>
                <thead>
                    <tr>
                        <th>Codigo</th>
                        <th>Nombre</th>
                        <th>Categoria</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="productos-tbody">
                </tbody>
            </table>
        </div>

        <div class="paginacion" id="paginacion"></div>

    </main>

</div>

<script>
const PRODUCTOS_SEMILLA = [
    { codigo: 'TC001', nombre: 'Torta Cuadrada de Chocolate', categoria: 'Tortas Cuadradas', precio: 45000, descripcion: '', stock: 10, stock_critico: 3, imagen: '' },
    { codigo: 'TC002', nombre: 'Torta Cuadrada de Frutas', categoria: 'Tortas Cuadradas', precio: 50000, descripcion: '', stock: 8, stock_critico: 2, imagen: '' },
    { codigo: 'TT001', nombre: 'Torta Circular de Vainilla', categoria: 'Tortas Circulares', precio: 40000, descripcion: '', stock: 12, stock_critico: null, imagen: '' },
    { codigo: 'TT002', nombre: 'Torta Circular de Manjar', categoria: 'Tortas Circulares', precio: 42000, descripcion: '', stock: 6, stock_critico: 2, imagen: '' },
    { codigo: 'PI001', nombre: 'Mousse de Chocolate', categoria: 'Postres Individuales', precio: 5000, descripcion: '', stock: 30, stock_critico: 5, imagen: '' },
    { codigo: 'PI002', nombre: 'Tiramisu Clasico', categoria: 'Postres Individuales', precio: 5500, descripcion: '', stock: 25, stock_critico: null, imagen: '' },
    { codigo: 'PSA001', nombre: 'Torta Sin Azucar de Naranja', categoria: 'Sin Azucar', precio: 48000, descripcion: '', stock: 5, stock_critico: 2, imagen: '' },
    { codigo: 'PSA002', nombre: 'Cheesecake Sin Azucar', categoria: 'Sin Azucar', precio: 47000, descripcion: '', stock: 4, stock_critico: 1, imagen: '' },
    { codigo: 'PT001', nombre: 'Empanada de Manzana', categoria: 'Pasteleria Tradicional', precio: 3000, descripcion: '', stock: 40, stock_critico: 10, imagen: '' },
    { codigo: 'PT002', nombre: 'Tarta de Santiago', categoria: 'Pasteleria Tradicional', precio: 6000, descripcion: '', stock: 15, stock_critico: null, imagen: '' },
    { codigo: 'PG001', nombre: 'Brownie Sin Gluten', categoria: 'Sin Gluten', precio: 4000, descripcion: '', stock: 20, stock_critico: 5, imagen: '' },
    { codigo: 'PG002', nombre: 'Pan Sin Gluten', categoria: 'Sin Gluten', precio: 3500, descripcion: '', stock: 18, stock_critico: null, imagen: '' },
    { codigo: 'PV001', nombre: 'Torta Vegana de Chocolate', categoria: 'Vegano', precio: 50000, descripcion: '', stock: 7, stock_critico: 2, imagen: '' },
    { codigo: 'PV002', nombre: 'Galletas Veganas de Avena', categoria: 'Vegano', precio: 4500, descripcion: '', stock: 35, stock_critico: null, imagen: '' },
    { codigo: 'TE001', nombre: 'Torta Especial de Cumpleanos', categoria: 'Tortas Especiales', precio: 55000, descripcion: '', stock: 3, stock_critico: 1, imagen: '' },
    { codigo: 'TE002', nombre: 'Torta Especial de Boda', categoria: 'Tortas Especiales', precio: 60000, descripcion: '', stock: 2, stock_critico: 1, imagen: '' }
];

function obtenerProductos() {
    if (!localStorage.getItem('productos')) {
        localStorage.setItem('productos', JSON.stringify(PRODUCTOS_SEMILLA));
    }
    return JSON.parse(localStorage.getItem('productos'));
}

function guardarProductos(lista) {
    localStorage.setItem('productos', JSON.stringify(lista));
}

let PRODUCTOS = obtenerProductos();

const POR_PAGINA = 8;
let paginaActual = 1;
let productosFiltrados = [...PRODUCTOS];

function filtrarProductos(texto) {
    const t = texto.trim().toLowerCase();
    productosFiltrados = t
        ? PRODUCTOS.filter(p => p.nombre.toLowerCase().includes(t) || p.codigo.toLowerCase().includes(t))
        : [...PRODUCTOS];
    paginaActual = 1;
    renderizar();
}

function renderizar() {
    const inicio = (paginaActual - 1) * POR_PAGINA;
    const fin = inicio + POR_PAGINA;
    const pagina = productosFiltrados.slice(inicio, fin);
    const tbody = document.getElementById('productos-tbody');

    if (pagina.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:#999;">No se encontraron productos.</td></tr>';
    } else {
        tbody.innerHTML = pagina.map(p => {
            const alertaStock = p.stock_critico !== null && p.stock_critico !== '' && p.stock <= parseInt(p.stock_critico);
            return `
            <tr>
                <td>${p.codigo}</td>
                <td>${p.nombre}</td>
                <td>${p.categoria}</td>
                <td>$${parseFloat(p.precio).toLocaleString('es-CL')}</td>
                <td style="${alertaStock ? 'color:#c62828;font-weight:700;' : ''}">${p.stock}${alertaStock ? ' !' : ''}</td>
                <td class="acciones">
                    <button class="btn-accion ver" onclick="window.location.href='ver-producto.html?codigo=${p.codigo}'" title="Ver">Ver</button>
                    ${sesion.rol === 'Vendedor' ? '' : `<button class="btn-accion editar" onclick="window.location.href='editar-producto.html?codigo=${p.codigo}'" title="Editar">Editar</button>
                    <button class="btn-accion eliminar" onclick="eliminarProducto('${p.codigo}')" title="Eliminar">Eliminar</button>`}
                </td>
            </tr>`;
        }).join('');
    }

    renderizarPaginacion();
}

function renderizarPaginacion() {
    const totalPaginas = Math.ceil(productosFiltrados.length / POR_PAGINA);
    const div = document.getElementById('paginacion');
    if (totalPaginas <= 1) { div.innerHTML = ''; return; }

    let html = `<button onclick="irPagina(1)">«</button>`;
    html += `<button onclick="irPagina(${paginaActual - 1})" ${paginaActual <= 1 ? 'disabled style="opacity:0.4"' : ''}>‹</button>`;

    for (let i = 1; i <= totalPaginas; i++) {
        html += `<button onclick="irPagina(${i})" ${i === paginaActual ? 'class="activo"' : ''}>${i}</button>`;
    }

    html += `<button onclick="irPagina(${paginaActual + 1})" ${paginaActual >= totalPaginas ? 'disabled style="opacity:0.4"' : ''}>›</button>`;
    html += `<button onclick="irPagina(${totalPaginas})">»</button>`;

    div.innerHTML = html;
}

function irPagina(n) {
    const total = Math.ceil(productosFiltrados.length / POR_PAGINA);
    if (n < 1 || n > total) return;
    paginaActual = n;
    renderizar();
}

function eliminarProducto(codigo) {
    if (!confirm('¿Estas seguro de eliminar este producto?')) return;
    let lista = obtenerProductos();
    const idx = lista.findIndex(p => p.codigo === codigo);
    if (idx !== -1) lista.splice(idx, 1);
    guardarProductos(lista);
    PRODUCTOS = obtenerProductos();
    productosFiltrados = productosFiltrados.filter(p => p.codigo !== codigo);
    renderizar();
}

let sesion = { rol: '' };

document.addEventListener('DOMContentLoaded', () => {
    sesion = JSON.parse(localStorage.getItem('usuario_sesion') || '{}');
    const nav = document.getElementById('sidebar-nav');
    if (sesion.rol === 'Vendedor') {
        nav.innerHTML = `
            <a href="./listado-productos.html" class="active">Productos</a>
            <a href="#" onclick="localStorage.removeItem('usuario_sesion'); window.location.href='../../index.html'; return false;" style="margin-top:auto;padding-top:20px;border-top:1px solid #ddd;">Cerrar Sesion</a>
        `;
        document.querySelector('.top-bar-right').innerHTML = '';
    }
    renderizar();
});
</script>

<script src="../js/js-Admin/auth-check.js" defer></script>
</body>
</html>
