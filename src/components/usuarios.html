<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listado de Usuarios - Pasteleria Mil Sabores</title>
    <link rel="stylesheet" href="../css/css-Admin/usuarios.css">
</head>
<body>

<div class="container">

    <aside class="sidebar">
        <div class="logo">
            <h2>Pasteleria<br>Mil Sabores</h2>
        </div>
        <nav>
            <a href="./admin-home.html">Dashboard</a>
            <a href="./listado-productos.html">Productos</a>
            <a href="#" class="active">Usuarios</a>
            <a href="#">Inventario</a>
            <a href="#">Reportes</a>
            <a href="#" onclick="localStorage.removeItem('usuario_sesion'); window.location.href='../../index.html'; return false;" style="margin-top:auto;padding-top:20px;border-top:1px solid #ddd;">Cerrar Sesion</a>
        </nav>
    </aside>

    <main class="contenido">

        <div class="top-bar">
            <h1>Usuarios</h1>
            <div class="top-bar-right">
                <button class="btn-nuevo" onclick="window.location.href='./nuevo-usuario.html'">
                    NUEVO USUARIO
                </button>
            </div>
        </div>

        <div class="subtitulo">
            Todos los usuarios
        </div>

        <div class="tabla-container">

            <table>

                <thead>
                    <tr>
                        <th>RUN</th>
                        <th>Nombres</th>
                        <th>Apellidos</th>
                        <th>Correo</th>
                        <th>Tipo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody id="usuarios-tbody">
                </tbody>

            </table>

        </div>

        <div class="paginacion" id="paginacion"></div>

        <script>
        function cargarUsuarios() {
            const usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];
            const tbody = document.getElementById('usuarios-tbody');
            if (usuarios.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:#999;">No hay usuarios registrados.</td></tr>';
                document.getElementById('paginacion').innerHTML = '';
                return;
            }
            tbody.innerHTML = usuarios.map((u, i) => `
                <tr>
                    <td>${u.run || 'N/A'}</td>
                    <td>${u.nombres || 'N/A'}</td>
                    <td>${u.apellidos || 'N/A'}</td>
                    <td>${u.correo}</td>
                    <td><span class="estado ${(u.tipo || u.rol) === 'Administrador' ? 'activo' : ((u.tipo || u.rol) === 'Vendedor' ? 'pendiente' : '')}">${u.tipo || u.rol || 'Cliente'}</span></td>
                    <td class="acciones">
                        <button class="btn-accion ver" onclick="window.location.href='ver-usuario.html?id=${i}'">Ver</button>
                        <button class="btn-accion editar" onclick="window.location.href='editar-usuario.html?id=${i}'">Editar</button>
                        <button class="btn-accion eliminar" onclick="eliminarUsuario(${i})">Eliminar</button>
                    </td>
                </tr>
            `).join('');
            document.getElementById('paginacion').innerHTML = '';
        }

        function eliminarUsuario(id) {
            if (!confirm('¿Eliminar este usuario?')) return;
            const usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];
            usuarios.splice(id, 1);
            localStorage.setItem('usuarios', JSON.stringify(usuarios));
            cargarUsuarios();
        }

        document.addEventListener('DOMContentLoaded', cargarUsuarios);
        </script>

    </main>

</div>

<script src="../js/js-Admin/auth-check.js" defer></script>
</body>
</html>
