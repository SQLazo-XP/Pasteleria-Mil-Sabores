<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Producto - Administrador | Pastelería Mil Sabores</title>
    <link rel="stylesheet" href="../css/css-Admin/admin-productos.css">
</head>
<body>

<div class="container">

    <aside class="sidebar">
        <div class="logo"><h2>Pastelería<br>Mil Sabores</h2></div>
        <nav>
            <a href="./admin-home.html">Dashboard</a>
            <a href="./listado-productos.html">Productos</a>
            <a href="./usuarios.html">Usuarios</a>
            <a href="#">Inventario</a>
            <a href="#">Reportes</a>
            <a href="#">Clientes</a>
            <a href="#" onclick="localStorage.removeItem('usuario_sesion'); window.location.href='../../index.html'; return false;" style="margin-top:auto;padding-top:20px;border-top:1px solid #ddd;">Cerrar Sesion</a>
        </nav>
    </aside>

    <main class="contenido">

        <h1 class="page-title">Crear Producto</h1>

        <div class="form-card">
            <div class="form-card-header">Nuevo Producto</div>

            <form id="form-producto" novalidate>
                <label>Código</label>
                <input type="text" id="codigo" placeholder="Ej. TC003" required>

                <label>Nombre</label>
                <input type="text" id="nombre" placeholder="Nombre del producto" required>

                <label>Categoría</label>
                <select id="categoria" required>
                    <option value="">Seleccionar categoría</option>
                    <option value="Tortas Cuadradas">Tortas Cuadradas</option>
                    <option value="Tortas Circulares">Tortas Circulares</option>
                    <option value="Postres Individuales">Postres Individuales</option>
                    <option value="Sin Azúcar">Sin Azúcar</option>
                    <option value="Pastelería Tradicional">Pastelería Tradicional</option>
                    <option value="Sin Gluten">Sin Gluten</option>
                    <option value="Vegano">Vegano</option>
                    <option value="Tortas Especiales">Tortas Especiales</option>
                </select>

                <label>Precio</label>
                <input type="number" id="precio" placeholder="Ej. 45000" min="1" required>

                <label>Descripción</label>
                <textarea id="descripcion" placeholder="Descripción del producto" rows="4"></textarea>

                <div class="btn-row">
                    <button type="submit" class="btn-guardar">Guardar Producto</button>
                    <button type="button" class="btn-cancelar" onclick="window.location.href='./listado-productos.html'">Cancelar</button>
                </div>
            </form>
        </div>

    </main>

</div>

<script>
document.getElementById('form-producto').addEventListener('submit', function(e) {
    e.preventDefault();
    const codigo = document.getElementById('codigo').value.trim();
    const nombre = document.getElementById('nombre').value.trim();
    const categoria = document.getElementById('categoria').value;
    const precio = document.getElementById('precio').value;
    const descripcion = document.getElementById('descripcion').value.trim();

    if (!codigo || !nombre || !categoria || !precio) {
        alert('Todos los campos obligatorios deben estar llenos.');
        return;
    }

    const productos = JSON.parse(localStorage.getItem('productos')) || [];
    if (productos.some(p => p.codigo === codigo)) {
        alert('El codigo ya existe.');
        return;
    }

    productos.push({ codigo, nombre, categoria, precio: parseInt(precio), descripcion });
    localStorage.setItem('productos', JSON.stringify(productos));
    alert(`Producto "${nombre}" creado exitosamente.`);
    window.location.href = './listado-productos.html';
});
</script>

<script src="../js/js-Admin/auth-check.js" defer></script>
</body>
</html>
