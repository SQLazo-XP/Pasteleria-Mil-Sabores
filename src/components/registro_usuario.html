<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro de Usuario - Pasteleria Mil Sabores</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/css-Home/home.css">
    <link rel="stylesheet" href="../css/css-Registro_Usuario/registro_usuario.css">
    <link rel="stylesheet" href="../css/css-Home/footers_menu.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="../js/js-Admin/region-comuna-data.js"></script>
  </head>
  <body>

    <header>
      <nav class="navbar">
        <a href="../../index.html" class="logo-link">
          <img src="../assets/logo.png" alt="Logo Mil Sabores" class="logoMenu" id="logo">
        </a>
        <ul class="navbar-links">
          <li><a href="../../index.html">Home</a></li>
          <li><a href="./productos.html">Productos</a></li>
          <li><a href="./nosotros.html">Nosotros</a></li>
          <li><a href="./blogs.html">Blogs</a></li>
          <li><a href="./contactos.html">Contacto</a></li>
        </ul>
        <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
        <div class="cart-wrapper">
          <div class="cart-icon" id="cart-icon">🛒<span class="cart-badge" id="cart-count">0</span></div>
          <div class="cart-dropdown" id="cart-dropdown">
            <div class="cart-dropdown-header">Carrito de Compras</div>
            <div class="cart-items" id="cart-items"></div>
            <div class="cart-dropdown-footer">
              <span>Total: $<span id="cart-total">0</span></span>
              <button class="cart-checkout-btn">Ver Carrito</button>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <section class="register-section">
      <div class="register-card">
        <div class="form-header-bar">
          <div class="form-header-title">Registro de usuario</div>
        </div>

        <form id="register-form" class="form-body" novalidate>
          <div class="form-group">
            <label for="run" class="form-label">RUN</label>
            <input type="text" id="run" class="form-input" placeholder="Ej. 19011022K (sin puntos ni guion)" maxlength="9" required>
          </div>
          <div class="form-group">
            <label for="nombres" class="form-label">Nombres</label>
            <input type="text" id="nombres" class="form-input" placeholder="Ej. Juan" maxlength="50" required>
          </div>
          <div class="form-group">
            <label for="apellidos" class="form-label">Apellidos</label>
            <input type="text" id="apellidos" class="form-input" placeholder="Ej. Perez Gomez" maxlength="100" required>
          </div>
          <div class="form-group">
            <label for="correo" class="form-label">Correo</label>
            <input type="email" id="correo" class="form-input" placeholder="correo@ejemplo.com" maxlength="100" required>
          </div>
          <div class="form-group">
            <label for="confirmar-correo" class="form-label">Confirmar Correo</label>
            <input type="email" id="confirmar-correo" class="form-input" placeholder="Repite tu correo electronico" required>
          </div>
          <div class="form-group">
            <label for="contrasena" class="form-label">Contrasena</label>
            <input type="password" id="contrasena" class="form-input" placeholder="Minimo 4, maximo 10 caracteres" required>
          </div>
          <div class="form-group">
            <label for="confirmar-contrasena" class="form-label">Confirmar Contrasena</label>
            <input type="password" id="confirmar-contrasena" class="form-input" placeholder="Repite tu contrasena" required>
          </div>
          <div class="form-group">
            <label for="fecha_nac" class="form-label">Fecha de Nacimiento (opcional)</label>
            <input type="date" id="fecha_nac" class="form-input">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="region" class="form-label">Region</label>
              <select id="region" class="form-select" required>
                <option value="">-- Seleccione la region --</option>
              </select>
            </div>
            <div class="form-group">
              <label for="comuna" class="form-label">Comuna</label>
              <select id="comuna" class="form-select" disabled required>
                <option value="">-- Seleccione la comuna --</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="direccion" class="form-label">Direccion</label>
            <input type="text" id="direccion" class="form-input" placeholder="Ej. Calle Falsa 123" maxlength="300" required>
          </div>
          <div class="submit-btn-container">
            <button type="submit" class="submit-btn">Registrar</button>
          </div>
        </form>
      </div>
    </section>

    <footer class="footer">
      <div class="footer-container">
        <div class="footer-left">
          <h4 class="footer-brand">Pasteleria Mil Sabores</h4>
          <div class="payment-icons">
            <img src="https://cdn-icons-png.flaticon.com/512/196/196578.png" alt="Visa">
            <img src="https://cdn-icons-png.flaticon.com/512/349/349228.png" alt="MasterCard">
            <img src="https://cdn-icons-png.flaticon.com/512/349/349228.png" alt="Amex">
            <img src="https://cdn-icons-png.flaticon.com/512/196/196566.png" alt="PayPal">
          </div>
        </div>
        <div class="footer-center">
          <a href="../../index.html">Home</a>
          <span>|</span>
          <a href="./productos.html">Productos</a>
          <span>|</span>
          <a href="./nosotros.html">Nosotros</a>
          <span>|</span>
          <a href="./blogs.html">Blogs</a>
          <span>|</span>
          <a href="./contactos.html">Contacto</a>
        </div>
        <div class="footer-right">
          <p>Stay In Touch! Join our Newsletter.</p>
          <form class="newsletter">
            <input type="email" placeholder="Enter Email">
            <button type="submit">Subscribe</button>
          </form>
          <div class="social-links">
            <a href="#" class="social-icon" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
            <a href="#" class="social-icon" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="#" class="social-icon" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
          </div>
        </div>
      </div>
    </footer>

    <script src="../js/js-Carrito/carrito.js" defer></script>
    <script src="../js/js-Registro_Usuario/registro_usuario.js" defer></script>
  </body>
</html>
