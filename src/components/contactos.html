<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Pastelería Mil Sabores</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/css-Home/home.css?v=10">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- ===== BARRA DE NAVEGACION ===== -->
    <header>
      <nav class="navbar">
        <a href="../../index.html" class="logo-link">
          <img src="../assets/logo.png" alt="Logo Mil Sabores" class="logoMenu" id="logo">
        </a>
        <ul class="navbar-links">
          <li><a href="../../index.html">Home</a></li>
          <li><a href="./productos.html">Productos</a></li>
          <li><a href="./nosotros.html">Nosotros</a></li>
          <li><a href="./blogs.html">Blogs</a></li>
          <li><a href="./contactos.html">Contacto</a></li>
        </ul>
        <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
        <div class="cart-wrapper">
          <div class="cart-icon" id="cart-icon">🛒<span class="cart-badge" id="cart-count">0</span></div>
          <div class="cart-dropdown" id="cart-dropdown">
            <div class="cart-dropdown-header">Carrito de Compras</div>
            <div class="cart-items" id="cart-items"></div>
            <div class="cart-dropdown-footer">
              <span>Total: $<span id="cart-total">0</span></span>
              <button class="cart-checkout-btn">Ver Carrito</button>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <!-- ===== CONTENIDO PRINCIPAL ===== -->
    <main class="contactos-main">

        <div class="contactos-logo">
            <div class="contactos-placeholder"></div>
        </div>

        <h1 class="contactos-nombre">Pastelería Mil Sabores</h1>

        <!-- ===== FORMULARIO DE CONTACTO ===== -->
        <section class="contactos-formulario">

            <div class="contactos-titulo-form">
                FORMULARIO DE CONTACTOS
            </div>

            <form id="contacto-form">

                <label>Nombre Completo</label>
                <input type="text" placeholder="Tu nombre" required>

                <label>Correo</label>
                <input type="email" placeholder="tucorreo@ejemplo.com" required>

                <label>Contenido</label>
                <textarea placeholder="Escribe tu mensaje aquí..." required></textarea>

                <button type="submit" class="contactos-btn">
                    ENVIAR MENSAJE
                </button>

            </form>

        </section>

    </main>

    <!-- ===== PIE DE PAGINA ===== -->
    <footer class="footer">
      <div class="footer-container">
        <div class="footer-left">
          <h4 class="footer-brand">Pastelería Mil Sabores</h4>
          <div class="payment-icons">
            <img src="https://cdn-icons-png.flaticon.com/512/196/196578.png" alt="Visa">
            <img src="https://cdn-icons-png.flaticon.com/512/349/349228.png" alt="MasterCard">
            <img src="https://cdn-icons-png.flaticon.com/512/196/196565.png" alt="Amex">
            <img src="https://cdn-icons-png.flaticon.com/512/196/196566.png" alt="PayPal">
          </div>
        </div>
        <div class="footer-center">
          <a href="../../index.html">Home</a>
          <span>|</span>
          <a href="./productos.html">Productos</a>
          <span>|</span>
          <a href="./nosotros.html">Nosotros</a>
          <span>|</span>
          <a href="./blogs.html">Blogs</a>
          <span>|</span>
          <a href="./contactos.html">Contacto</a>
        </div>
        <div class="footer-right">
          <p>Stay In Touch! Join our Newsletter.</p>
          <form class="newsletter">
            <input type="email" placeholder="Enter Email">
            <button type="submit">Subscribe</button>
          </form>
          <div class="social-links">
            <a href="#" class="social-icon" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
            <a href="#" class="social-icon" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="#" class="social-icon" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
          </div>
        </div>
      </div>
    </footer>

    <script src="../js/js-Carrito/carrito.js" defer></script>
    <script>
      document.getElementById('contacto-form').addEventListener('submit', function(e) {
        e.preventDefault();
        alert('Mensaje enviado correctamente. ¡Gracias por contactarnos!');
        this.reset();
      });
    </script>
</body>
</html>
