<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Producto - Administrador | Pasteleria Mil Sabores</title>
    <link rel="stylesheet" href="../css/css-Admin/admin-productos.css">
</head>
<body>

<div class="container">

    <aside class="sidebar">
        <div class="logo"><h2>Pasteleria<br>Mil Sabores</h2></div>
        <nav>
            <a href="./admin-home.html">Dashboard</a>
            <a href="./listado-productos.html">Productos</a>
            <a href="./usuarios.html">Usuarios</a>
            <a href="#">Inventario</a>
            <a href="#">Reportes</a>
            <a href="#" onclick="localStorage.removeItem('usuario_sesion'); window.location.href='../../index.html'; return false;" style="margin-top:auto;padding-top:20px;border-top:1px solid #ddd;">Cerrar Sesion</a>
        </nav>
    </aside>

    <main class="contenido">

        <h1 class="page-title">Editar Producto</h1>

        <div class="form-card">
            <div class="form-card-header">Editar Producto</div>

            <form id="form-producto" novalidate>
                <label>Codigo</label>
                <input type="text" id="codigo" readonly style="background:#f4f4f4;cursor:not-allowed;">

                <label>Nombre <span style="color:#c62828;">*</span></label>
                <input type="text" id="nombre" maxlength="100" required>

                <label>Descripcion</label>
                <textarea id="descripcion" rows="4" maxlength="500"></textarea>
                <small style="color:#888;font-size:0.75rem;margin-top:2px;">Maximo 500 caracteres (opcional)</small>

                <label>Precio <span style="color:#c62828;">*</span></label>
                <input type="number" id="precio" min="0" step="0.01" required>
                <small style="color:#888;font-size:0.75rem;margin-top:2px;">Minimo 0 (producto FREE). Puede ser decimal.</small>

                <label>Stock <span style="color:#c62828;">*</span></label>
                <input type="number" id="stock" min="0" step="1" required>
                <small style="color:#888;font-size:0.75rem;margin-top:2px;">Solo numeros enteros.</small>

                <label>Stock Critico</label>
                <input type="number" id="stock_critico" min="0" step="1">
                <small style="color:#888;font-size:0.75rem;margin-top:2px;">Opcional. Solo numeros enteros.</small>

                <label>Categoria <span style="color:#c62828;">*</span></label>
                <select id="categoria" required>
                    <option value="">Seleccionar categoria</option>
                    <option value="Tortas Cuadradas">Tortas Cuadradas</option>
                    <option value="Tortas Circulares">Tortas Circulares</option>
                    <option value="Postres Individuales">Postres Individuales</option>
                    <option value="Sin Azucar">Sin Azucar</option>
                    <option value="Pasteleria Tradicional">Pasteleria Tradicional</option>
                    <option value="Sin Gluten">Sin Gluten</option>
                    <option value="Vegano">Vegano</option>
                    <option value="Tortas Especiales">Tortas Especiales</option>
                </select>

                <label>Imagen</label>
                <input type="text" id="imagen" placeholder="URL de la imagen (opcional)">

                <div class="btn-row">
                    <button type="submit" class="btn-guardar">Guardar Cambios</button>
                    <button type="button" class="btn-cancelar" onclick="window.location.href='./listado-productos.html'">Cancelar</button>
                </div>
            </form>
        </div>

    </main>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const codigo = params.get('codigo');
const productos = JSON.parse(localStorage.getItem('productos')) || [];
const idx = productos.findIndex(p => p.codigo === codigo);
const producto = productos[idx];

if (producto) {
    document.getElementById('codigo').value = producto.codigo;
    document.getElementById('nombre').value = producto.nombre;
    document.getElementById('descripcion').value = producto.descripcion || '';
    document.getElementById('precio').value = producto.precio;
    document.getElementById('stock').value = producto.stock;
    document.getElementById('stock_critico').value = producto.stock_critico !== null && producto.stock_critico !== undefined ? producto.stock_critico : '';
    document.getElementById('categoria').value = producto.categoria;
    document.getElementById('imagen').value = producto.imagen || '';
} else {
    document.querySelector('.form-card').innerHTML = '<p style="padding:40px;text-align:center;">Producto no encontrado.</p>';
}

document.getElementById('form-producto').addEventListener('submit', function(e) {
    e.preventDefault();
    const nombre = document.getElementById('nombre').value.trim();
    const descripcion = document.getElementById('descripcion').value.trim();
    const precio = document.getElementById('precio').value;
    const stock = document.getElementById('stock').value;
    const stock_critico = document.getElementById('stock_critico').value;
    const categoria = document.getElementById('categoria').value;
    const imagen = document.getElementById('imagen').value.trim();

    if (!nombre || nombre.length > 100) { alert('Nombre obligatorio, maximo 100 caracteres.'); return; }
    if (descripcion.length > 500) { alert('Descripcion maximo 500 caracteres.'); return; }
    if (precio === '' || parseFloat(precio) < 0) { alert('Precio debe ser 0 o mayor.'); return; }
    if (stock === '' || parseInt(stock) < 0) { alert('Stock debe ser 0 o mayor.'); return; }
    if (!categoria) { alert('Seleccione una categoria.'); return; }

    const productos = JSON.parse(localStorage.getItem('productos')) || [];
    if (productos[idx]) {
        productos[idx].nombre = nombre;
        productos[idx].descripcion = descripcion;
        productos[idx].precio = parseFloat(precio);
        productos[idx].stock = parseInt(stock);
        productos[idx].stock_critico = stock_critico !== '' ? parseInt(stock_critico) : null;
        productos[idx].categoria = categoria;
        productos[idx].imagen = imagen;
        localStorage.setItem('productos', JSON.stringify(productos));
    }
    alert('Producto "' + nombre + '" actualizado exitosamente.');
    window.location.href = './listado-productos.html';
});
</script>

<script src="../js/js-Admin/auth-check.js" defer></script>
</body>
</html>
